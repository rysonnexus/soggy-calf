name: Bug Report
description: Report a bug in The Soggy Calf
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the unexpected behaviour.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Development (local)
        - Docker dev
        - Production
