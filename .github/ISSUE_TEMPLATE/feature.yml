name: Feature Request
description: Suggest a new feature for The Soggy Calf
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What do you want?
      placeholder: A clear and concise description of the feature.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why is it needed?
      placeholder: What problem does this solve?
  - type: dropdown
    id: role
    attributes:
      label: Who benefits?
      options:
        - Dungeon Master (Admin)
        - Player
        - Both
    validations:
      required: true
